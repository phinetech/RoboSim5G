# OAI CN Configuration File
### This file can be used by all OAI NFs
### Some fields are specific to an NF and will be ignored by other NFs

## NOTE ON YAML ANCHORS ##
# We use YAML anchors to ease the configuration and to avoid duplicating parts of the configuration.
# This is especially true for the SNSSAIs, as we have to define them for multiple NFs.
# Please note that the use of anchors is not mandatory, and you can define the SNSSAI in each NF yourself.
# You can read more about anchors here: https://yaml.org/spec/1.2.2/#anchors-and-aliases

############# Common configuration

# Log level for all the NFs
log_level:
  general: debug

# If you enable registration, the other NFs will use the NRF discovery mechanism
register_nf:
  general: yes

http_version: 2

############## SBI Interfaces
### Each NF takes its local SBI interfaces and remote interfaces from here, unless it gets them using NRF discovery mechanisms
nfs:
  smf:
    host: smf.free5gc.org
    sbi:
      port: 8000
      api_version: v1
      interface_name: eth0
    n4:
      interface_name: eth0
      port: 8805
  upf:
    host: oai-upf
    sbi:
      port: 8080
      api_version: v1
      interface_name: phine-net
    n3:
      interface_name: demo-n3
      port: 2152
    n4:
      interface_name: phine-net
      port: 8805
    n6:
      interface_name: demo-n6
    n9:
      interface_name: demo-n9
      port: 2152
  nrf:
    host: 192.168.70.130
    sbi:
      port: 8000
      api_version: v1
      interface_name: eth0

## general single_nssai configuration
## Defines YAML anchors, which are reused in the config file
snssais:
  - &embb_slice1
    sst: 1
  - &embb_slice2
    sst: 1
    sd: 000001 # in hex
  - &custom_slice
    sst: 222
    sd: 00007B # in hex
  - &free5gc_slice
    sst: 1
    sd: 010203 # in hex

############## NF-specific configuration
upf:
  support_features:
    enable_bpf_datapath: yes    # If "on": BPF is used as datapath else simpleswitch is used, DEFAULT= off
    enable_qos: yes
  remote_n6_gw: oai-ext-dn
  upf_info:
    sNssaiUpfInfoList:
      - sNssai: *embb_slice1
        dnnUpfInfoList:
          - dnn: "oai"
      - sNssai: *embb_slice2
        dnnUpfInfoList:
          - dnn: "oai.ipv4"
      - sNssai: *custom_slice
        dnnUpfInfoList:
          - dnn: "default"
      - sNssai: *free5gc_slice
        dnnUpfInfoList:
          - dnn: "internet"

## DNN configuration
dnns:
  - dnn: "oai"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.1.1.128/25"
  - dnn: "oai.ipv4"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.1.1.64/26"
  - dnn: "default"
    pdu_session_type: "IPV4"
    ipv4_subnet: "12.1.1.0/26"
  - dnn: "ims"
    pdu_session_type: "IPV4V6"
    ipv4_subnet: "14.1.1.2/24"
  - dnn: "internet"
    pdu_session_type: "IPV4"
    ipv4_subnet: "10.60.0.0/16"
  - dnn: "internet"
    pdu_session_type: "IPV4"
    ipv4_subnet: "10.61.0.0/16"