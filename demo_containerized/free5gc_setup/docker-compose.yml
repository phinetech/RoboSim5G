services:
    oai-upf:
        container_name: "upf"
        image: phinetech/oai-upf:f5gc-patch
        expose:
            - 2152/udp
            - 8805/udp
            - 8080/tcp
        volumes:
            - ./oai/oai_upf_config.yaml:/openair-upf/etc/config.yaml
            - /sys/fs/bpf:/sys/fs/bpf
            - /sys/kernel/debug:/sys/kernel/debug:rw
        environment:
            - TZ=Europe/Paris
        depends_on:
            - free5gc-nrf
        cap_add:
            - NET_ADMIN
            - SYS_ADMIN
        cap_drop:
            - ALL
        privileged: true
        network_mode: host
        extra_hosts:
            - "oai-ext-dn:192.168.72.135"
            - "oai-nrf:192.168.70.130"

    db:
        container_name: mongodb
        image: mongo:4.4
        command: mongod --port 27017
        expose:
            - "27017"
        volumes:
            - ./free5gc/dump:/data/dump
            - ./free5gc/mongorestore.sh:/docker-entrypoint-initdb.d/mongorestore.sh
        networks:
            public_net:
                ipv4_address: 192.168.70.131
                aliases:
                    - db

    free5gc-nrf:
        container_name: nrf
        image: free5gc/nrf:v4.1.0
        command: ./nrf -c ./config/nrfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/nrfcfg.yaml:/free5gc/config/nrfcfg.yaml
        environment:
            DB_URI: mongodb://db/free5gc
            GIN_MODE: release
        networks:
            public_net:
                aliases:
                    - nrf.free5gc.org
                ipv4_address: 192.168.70.130
        depends_on:
            - db

    free5gc-amf:
        container_name: amf
        image: free5gc/amf:v4.1.0
        command: ./amf -c ./config/amfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/amfcfg.yaml:/free5gc/config/amfcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.132
                aliases:
                    - amf.free5gc.org
        depends_on:
            - free5gc-nrf

    free5gc-ausf:
        container_name: ausf
        image: free5gc/ausf:v4.1.0
        command: ./ausf -c ./config/ausfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/ausfcfg.yaml:/free5gc/config/ausfcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.138
                aliases:
                    - ausf.free5gc.org
        depends_on:
            - free5gc-nrf

    free5gc-nssf:
        container_name: nssf
        image: free5gc/nssf:v4.1.0
        command: ./nssf -c ./config/nssfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/nssfcfg.yaml:/free5gc/config/nssfcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.146
                aliases:
                    - nssf.free5gc.org
        depends_on:
            - free5gc-nrf

    free5gc-pcf:
        container_name: pcf
        image: free5gc/pcf:v4.1.0
        command: ./pcf -c ./config/pcfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/pcfcfg.yaml:/free5gc/config/pcfcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.139
                aliases:
                    - pcf.free5gc.org
        depends_on:
            - free5gc-nrf

    free5gc-smf:
        container_name: smf
        image: free5gc/smf:v4.1.0
        command: ./smf -c ./config/smfcfg.yaml -u ./config/uerouting.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/smfcfg.yaml:/free5gc/config/smfcfg.yaml
            - ./free5gc/config/uerouting.yaml:/free5gc/config/uerouting.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.133
                aliases:
                    - smf.free5gc.org
        depends_on:
            - free5gc-nrf
            - oai-upf

    free5gc-udm:
        container_name: udm
        image: free5gc/udm:v4.1.0
        command: ./udm -c ./config/udmcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/udmcfg.yaml:/free5gc/config/udmcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.137
                aliases:
                    - udm.free5gc.org
        depends_on:
            - db
            - free5gc-nrf

    free5gc-udr:
        container_name: udr
        image: free5gc/udr:v4.1.0
        command: ./udr -c ./config/udrcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/udrcfg.yaml:/free5gc/config/udrcfg.yaml
        environment:
            DB_URI: mongodb://db/free5gc
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.136
                aliases:
                    - udr.free5gc.org
        depends_on:
            - db
            - free5gc-nrf

    free5gc-chf:
        container_name: chf
        image: free5gc/chf:v4.1.0
        command: ./chf -c ./config/chfcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/chfcfg.yaml:/free5gc/config/chfcfg.yaml
            - ./free5gc/cert:/free5gc/cert
        environment:
            DB_URI: mongodb://db/free5gc
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.154
                aliases:
                    - chf.free5gc.org
        depends_on:
            - db
            - free5gc-nrf
            - free5gc-webui

    free5gc-nef:
        container_name: nef
        image: free5gc/nef:v4.1.0
        command: ./nef -c ./config/nefcfg.yaml
        expose:
            - "8000"
        volumes:
            - ./free5gc/config/nefcfg.yaml:/free5gc/config/nefcfg.yaml
        environment:
            GIN_MODE: release
        networks:
            public_net:
                ipv4_address: 192.168.70.142
                aliases:
                    - nef.free5gc.org
        depends_on:
            - db
            - free5gc-nrf

    free5gc-webui:
        # user: admin
        # password: free5gc
        container_name: webui
        image: free5gc/webui:v4.1.0
        command: ./webui -c ./config/webuicfg.yaml
        expose:
            - "2121"
        volumes:
            - ./free5gc/config/webuicfg.yaml:/free5gc/config/webuicfg.yaml
        environment:
            - GIN_MODE=release
        networks:
            public_net:
                ipv4_address: 192.168.70.161
                aliases:
                    - webui
        ports:
            - "5000:5000"
            - "2122:2122"
            - "2121:2121"
        depends_on:
            - db
            - free5gc-nrf

    oai-ext-dn:
        privileged: true
        init: true
        container_name: oai-ext-dn
        image: oaisoftwarealliance/trf-gen-cn5g:latest
        environment:
            - EBPF_GW_SETUP=yes
            - EBPF_GW_N6_IP_ADDR=192.168.72.135
            - GW_SGI_IP_ADDR=192.168.70.135
            - GW_N3_IP_ADDR=192.168.71.135
            - UE_IP_ADDRESS_POOL=10.60.0.0/24
            - N6_UPF_IP_ADDR=192.168.72.129
            - SGI_DEMO_OAI_ADDR=192.168.70.129
        healthcheck:
            test: /bin/bash -c "ip r | grep 10.60.0"
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            public_net:
                ipv4_address: 192.168.70.135
            n3_net:
                ipv4_address: 192.168.71.135
            n6_net:
                ipv4_address: 192.168.72.135

networks:
    public_net:
        driver: bridge
        name: phine-net
        ipam:
            config:
                - subnet: 192.168.70.128/26
        driver_opts:
            com.docker.network.bridge.name: "phine-net"
    n3_net:
        driver: bridge
        name: demo-oai-n3-net
        ipam:
            config:
                - subnet: 192.168.71.128/26
        driver_opts:
            com.docker.network.bridge.name: "demo-n3"
    n6_net:
        driver: bridge
        name: demo-oai-n6-net
        ipam:
            config:
                - subnet: 192.168.72.128/26
        driver_opts:
            com.docker.network.bridge.name: "demo-n6"
